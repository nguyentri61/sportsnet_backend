server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    max-threads: 500
    max-connections: 1000
    keep-alive-timeout: 30000
    connection-timeout: 3000
  compression:
    enabled: true

spring:
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    default-encoding: UTF-8

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sports_net}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

   # pageable start with 1
  data:
    web:
      pageable:
        one-indexed-parameters: true

jwt:
  base64-secret: ${JWT_BASE64_SECRET:}
  token-create-validity-in-seconds: ${JWT_TOKEN_CREATE_VALIDITY_SECONDS:6400}
  token-verify-validity-in-seconds: ${JWT_TOKEN_VERIFY_VALIDITY_SECONDS:8640000}


app:
  file:
    upload-dir: ${APP_UPLOAD_DIR:uploads/}
    base-url: ${APP_FILE_BASE_URL:http://localhost:8080/uploads}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  geocoding:
    nominatim:
      base-url: ${NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
      user-agent: "${NOMINATIM_USER_AGENT:SportsNetBackend/1.0 (contact: bdmntnnt@gmail.com)}"
      email: ${NOMINATIM_EMAIL:bdmntnnt@gmail.com}
      accept-language: ${NOMINATIM_ACCEPT_LANGUAGE:vi,en}
      country-codes: ${NOMINATIM_COUNTRY_CODES:vn}

chatbot:
  url: ${CHATBOT_URL:http://127.0.0.1:9000/chat}

address:
  api:
    base-url: ${ADDRESS_API_BASE_URL:https://esgoo.net/api-tinhthanh-new}

vnpay:
  tmnCode: ${VNPAY_TMN_CODE:}
  hashSecret: ${VNPAY_HASH_SECRET:}
  returnUrl: ${VNPAY_RETURN_URL:http://localhost:3000/payment/vnpay-return}
  payUrl: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  client-ip: ${VNPAY_CLIENT_IP:127.0.0.1}

openapi:
  server-url: ${OPENAPI_SERVER_URL:http://localhost:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha