name: Build, Publish, and Deploy
 
on:
  push:
    branches:
      - main
 
jobs:
  # JOB 1: Build the app and push it to Docker Hub
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      # 1. Run tests to make sure the code isn't broken
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
 
      - name: Run Tests
        run: mvn clean test
 
      # 2. Log into Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      # 3. Build the Docker image and push it to your account
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags it as 'latest'. Make sure to update the username here if you don't use the secret directly!
          tags: ${{ secrets.DOCKER_USERNAME }}/sportsnet-backend:latest
 
  # JOB 2: Log into VPS and pull the new image
  deploy:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Connect to VPS and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/sportsnet_backend
            # 1. Pull the updated docker-compose.yml file from GitHub
            git pull origin main
            # 2. Pull the newly built image from Docker Hub
            docker compose pull sportsnet-app
            # 3. Restart the container with the new image (won't touch the database)
            docker compose up -d
